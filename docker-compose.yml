version: "3.8"

x-spark-common-env: &spark-common-env
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  NESSIE_URI: ${NESSIE_URI}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT}
  SPARK_MASTER_URL: ${SPARK_MASTER_URL}

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type":"spark","host":"spark://spark-master:7077"}'
    <<: *spark-common-env
    DREMIO_USERNAME: ${DREMIO_USERNAME}
    DREMIO_PASSWORD: ${DREMIO_PASSWORD}
    SPARK_HOME: /opt/spark
    JAVA_HOME: /opt/java/openjdk
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./spark/jobs:/opt/airflow/jobs
    - ./dbt:/opt/dbt
    - ./dataset:/opt/spark/dataset:ro
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - lakehouse-net

services:

  # ─── Object Storage ──────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-03-21T23-13-43Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
        mc mb --ignore-existing local/lakehouse
        echo 'MinIO bucket [lakehouse] ready'
      "
    networks:
      - lakehouse-net

  # ─── Iceberg Catalog (Nessie) ─────────────────────────────────────────────────

  nessie:
    image: projectnessie/nessie:0.76.6
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse-net

  # ─── Metadata Database ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse-net

  # ─── Spark Cluster ────────────────────────────────────────────────────────────

  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      <<: *spark-common-env
    volumes:
      - ./dataset:/opt/spark/dataset:ro
      - ./spark/jobs:/opt/spark/jobs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse-net

  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker
    hostname: spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - 3g
      - spark://spark-master:7077
    environment:
      <<: *spark-common-env
    volumes:
      - ./dataset:/opt/spark/dataset:ro
      - ./spark/jobs:/opt/spark/jobs:ro
    depends_on:
      - spark-master
    networks:
      - lakehouse-net

  # ─── Airflow ──────────────────────────────────────────────────────────────────

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command:
      - bash
      - -c
      - >-
        airflow db upgrade &&
        airflow users create --username "${AIRFLOW_ADMIN_USERNAME}" --password "${AIRFLOW_ADMIN_PASSWORD}" --firstname Admin --lastname User --role Admin --email admin@airflow.com &&
        (echo '{"spark_default":{"conn_type":"spark","host":"spark://spark-master:7077"}}' > /tmp/sc.json && airflow connections import /tmp/sc.json || true)
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    hostname: airflow-webserver
    ports:
      - "8082:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Dremio (Data Warehouse) ──────────────────────────────────────────────────

  dremio:
    image: dremio/dremio-oss:24.3.0
    container_name: dremio
    restart: on-failure
    ports:
      - "9047:9047"   # REST API + UI
      - "31010:31010" # JDBC/ODBC
      - "45678:45678" # Arrow Flight
    volumes:
      - dremio-data:/opt/dremio/data
    environment:
      DREMIO_JAVA_SERVER_EXTRA_OPTS: >-
        -Dpaths.dist=file:///opt/dremio/data/dist
        -Xmx1500m
        -Xms512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9047 || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 15
      start_period: 60s
    networks:
      - lakehouse-net

  dremio-setup:
    image: python:3.11-slim
    container_name: dremio-setup
    depends_on:
      dremio:
        condition: service_healthy
      nessie:
        condition: service_healthy
    environment:
      DREMIO_HOST: dremio
      DREMIO_PORT: "9047"
      DREMIO_USERNAME: ${DREMIO_USERNAME}
      DREMIO_PASSWORD: ${DREMIO_PASSWORD}
      NESSIE_URI: ${NESSIE_URI}
      NESSIE_URI_V2: ${NESSIE_URI_V2}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: >
      /bin/sh -c "pip install -q requests && python /scripts/setup_dremio.py"
    restart: "no"
    networks:
      - lakehouse-net

  # ─── Apache Superset (Dashboard) ─────────────────────────────────────────────

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/superset
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 60s
    networks:
      - lakehouse-net

  superset-init:
    image: python:3.11-slim
    container_name: superset-init
    depends_on:
      superset:
        condition: service_healthy
      dremio:
        condition: service_healthy
    environment:
      SUPERSET_HOST: superset
      SUPERSET_PORT: "8088"
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      DREMIO_HOST: dremio
      DREMIO_PORT: "9047"
      DREMIO_USERNAME: ${DREMIO_USERNAME}
      DREMIO_PASSWORD: ${DREMIO_PASSWORD}
    volumes:
      - ./superset/init_dashboard.py:/init_dashboard.py:ro
    entrypoint: >
      /bin/sh -c "pip install -q requests && python /init_dashboard.py"
    restart: "no"
    networks:
      - lakehouse-net

  # ─── OpenMetadata (Data Governance) ─────────────────────────────────────────
  # openmetadata/db ships MySQL 8 with the OM schema pre-loaded.
  # openmetadata-search is single-node Elasticsearch with security disabled.
  # openmetadata-server bootstraps on first start (~60 s) then serves on 8585.
  # openmetadata-setup runs metadata ingestion for Dremio, Airflow, and MinIO.

  openmetadata-db:
    image: openmetadata/db:1.5.0
    container_name: openmetadata-db
    environment:
      MYSQL_ROOT_PASSWORD: ${OPENMETADATA_MYSQL_ROOT_PASSWORD:-om_root_pass}
    volumes:
      - openmetadata-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - lakehouse-net

  openmetadata-search:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: openmetadata-search
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    volumes:
      - openmetadata-search-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - lakehouse-net

  openmetadata-server:
    image: openmetadata/server:1.5.0
    container_name: openmetadata-server
    ports:
      - "8585:8585"
      - "8586:8586"
    depends_on:
      openmetadata-db:
        condition: service_healthy
      openmetadata-search:
        condition: service_healthy
    environment:
      # Server
      OPENMETADATA_CLUSTER_NAME: openmetadata
      SERVER_PORT: "8585"
      SERVER_ADMIN_PORT: "8586"
      LOG_LEVEL: INFO
      # MySQL backend (pre-configured inside openmetadata/db image)
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_USE_SSL: "false"
      DB_USER: openmetadata_user
      DB_USER_PASSWORD: openmetadata_password
      DB_HOST: openmetadata-db
      DB_PORT: "3306"
      OM_DATABASE: openmetadata_db
      # Elasticsearch
      SEARCH_TYPE: elasticsearch
      ELASTICSEARCH_HOST: openmetadata-search
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_SCHEME: http
      ELASTICSEARCH_CONNECTION_TIMEOUT_SECS: "5"
      ELASTICSEARCH_SOCKET_TIMEOUT_SECS: "60"
      ELASTICSEARCH_BATCH_SIZE: "10"
      # Airflow pipeline client
      PIPELINE_SERVICE_CLIENT_ENDPOINT: "http://airflow-webserver:8080"
      PIPELINE_SERVICE_CLIENT_VERIFY_SSL: "no-ssl"
      # Authentication — basic (username + password, no external IdP)
      AUTHENTICATION_PROVIDER: basic
      JWT_ISSUER: open-metadata.org
      JWT_KEY_ID: Gb389a-9f76-gdjs-a92j-0242bk94356
      RSA_PUBLIC_KEY_FILE_PATH: /opt/openmetadata/conf/public_key.der
      RSA_PRIVATE_KEY_FILE_PATH: /opt/openmetadata/conf/private_key.der
    # Entrypoint is /bin/bash; CMD args become its arguments.
    # Pass -c so the shell executes the migration then starts the server.
    command:
      - -c
      - "./bootstrap/openmetadata-ops.sh migrate && /openmetadata-start.sh"
    healthcheck:
      # Accept 200 or 401 — both mean the server is up and responding
      test: ["CMD-SHELL", "wget --server-response -qO /dev/null http://localhost:8585/api/v1/system/status 2>&1 | grep -q 'HTTP/'"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - lakehouse-net

  openmetadata-setup:
    image: openmetadata/ingestion:1.5.0
    container_name: openmetadata-setup
    depends_on:
      openmetadata-server:
        condition: service_healthy
    environment:
      OM_HOST: openmetadata-server
      OM_PORT: "8585"
      OM_ADMIN_EMAIL: admin@openmetadata.org
      OM_ADMIN_PASSWORD: ${OPENMETADATA_ADMIN_PASSWORD:-admin}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./scripts:/scripts:ro
      - ./openmetadata/ingestion:/openmetadata/ingestion:ro
    entrypoint: ["python", "/scripts/setup_openmetadata.py"]
    restart: "no"
    networks:
      - lakehouse-net

  # ─── Monitoring ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    networks:
      - lakehouse-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - lakehouse-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - lakehouse-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lakehouse-net

  dbt-docs:
    image: nginx:alpine
    container_name: dbt-docs
    ports:
      - "18080:80"
    volumes:
      - ./dbt/target:/usr/share/nginx/html:ro
    networks:
      - lakehouse-net

volumes:
  minio-data:
  postgres-data:
  dremio-data:
  airflow-logs:
  prometheus-data:
  grafana-data:
  openmetadata-db-data:
  openmetadata-search-data:
  openmetadata-data:

networks:
  lakehouse-net:
    name: lakehouse-net
    driver: bridge
