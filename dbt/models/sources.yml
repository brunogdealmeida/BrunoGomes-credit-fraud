version: 2

sources:

  # ── Silver layer ─────────────────────────────────────────────────────────────
  # Written by Spark silver_transformation.py into Iceberg via Nessie.
  # dbt uses Dremio as the SQL engine to query these tables directly.

  - name: silver
    description: "Validated and enriched transactions (Spark → Iceberg, Nessie catalog)"
    database: nessie_lakehouse
    schema: silver
    tables:
      - name: tb_fraud_credit
        description: "Cleaned fraud transaction records after quarantine split and enrichment"
        columns:
          - name: timestamp
            description: "Transaction timestamp"
            tests: [not_null]
          - name: sending_address
            description: "Sender wallet/account address"
            tests: [not_null]
          - name: receiving_address
            description: "Receiver wallet/account address"
            tests: [not_null]
          - name: amount
            description: "Transaction amount (USD)"
            tests: [not_null]
          - name: transaction_type
            description: "Type of transaction"
            tests:
              - not_null
              - accepted_values:
                  values: ["purchase", "sale", "transfer", "phishing", "scam"]
          - name: location_region
            description: "Geographic region"
            tests:
              - not_null
              - accepted_values:
                  values: ["Africa", "Asia", "Europe", "North America", "South America"]
          - name: anomaly
            description: "Risk classification label assigned by enrichment"
            tests:
              - not_null
              - accepted_values:
                  values: ["low_risk", "moderate_risk", "high_risk"]
          - name: risk_score
            description: "Numeric risk score (0–100)"
            tests: [not_null]

  # ── Gold layer ────────────────────────────────────────────────────────────────
  # Written by Spark gold_aggregation.py into Iceberg via Nessie.
  # Tests validate the Spark output directly — dbt materializes nothing here.

  - name: gold
    description: "Business aggregations produced by Spark (Iceberg, Nessie catalog)"
    database: nessie_lakehouse
    schema: gold
    tables:

      - name: fraud_by_region
        description: "Fraud counts and amounts grouped by region and anomaly type"
        columns:
          - name: location_region
            tests:
              - not_null
              - accepted_values:
                  values: ["Africa", "Asia", "Europe", "North America", "South America"]
          - name: anomaly
            tests:
              - not_null
              - accepted_values:
                  values: ["low_risk", "moderate_risk", "high_risk"]
          - name: transaction_count
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
          - name: fraudulent_count
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
          - name: avg_risk_score
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 100

      - name: fraud_by_type
        description: "Transaction stats grouped by type, anomaly, and purchase pattern"
        columns:
          - name: transaction_type
            tests:
              - not_null
              - accepted_values:
                  values: ["purchase", "sale", "transfer", "phishing", "scam"]
          - name: anomaly
            tests:
              - not_null
              - accepted_values:
                  values: ["low_risk", "moderate_risk", "high_risk"]
          - name: transaction_count
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
          - name: avg_risk_score
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 100

      - name: daily_fraud_metrics
        description: "Daily transaction volume and risk distribution per region"
        columns:
          - name: transaction_date
            tests: [not_null]
          - name: location_region
            tests:
              - not_null
              - accepted_values:
                  values: ["Africa", "Asia", "Europe", "North America", "South America"]
          - name: total_transactions
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 1
          - name: high_risk_count
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
          - name: avg_risk_score
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 100

      - name: high_risk_transactions
        description: "Transactions where anomaly=high_risk OR risk_score >= 75"
        columns:
          - name: transaction_datetime
            tests: [not_null]
          - name: sending_address
            tests: [not_null]
          - name: amount
            tests: [not_null]
          - name: risk_score
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 100
          - name: anomaly
            tests:
              - not_null
              - accepted_values:
                  values: ["high_risk", "moderate_risk"]

      - name: risk_profile
        description: "Risk score distribution by user segment (age_group × purchase_pattern)"
        columns:
          - name: age_group
            tests: [not_null]
          - name: purchase_pattern
            tests: [not_null]
          - name: anomaly
            tests:
              - not_null
              - accepted_values:
                  values: ["low_risk", "moderate_risk", "high_risk"]
          - name: transaction_count
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
          - name: avg_risk_score
            tests:
              - not_null
              - dbt_utils.accepted_range:
                  min_value: 0
                  max_value: 100
