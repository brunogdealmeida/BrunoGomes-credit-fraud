name: fraud_lakehouse
version: "1.0.0"
config-version: 2

profile: datalakehouse

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Bronze quality models are materialized as tables in Dremio (@admin.dbt_quality.*).
# Silver and gold remain test-only — no SQL models in those folders.
models:
  fraud_lakehouse:
    bronze:
      +materialized: table
