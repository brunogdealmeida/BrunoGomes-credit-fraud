global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Container-level CPU / memory / network / disk I/O
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # MinIO — requires MINIO_PROMETHEUS_AUTH_TYPE=public on the MinIO service
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  # Nessie (Quarkus Micrometer) — /q/metrics exposed by default
  - job_name: nessie
    metrics_path: /q/metrics
    static_configs:
      - targets: ['nessie:19120']

  # PostgreSQL via postgres_exporter
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
